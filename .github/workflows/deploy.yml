name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Setup SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull and build
        timeout-minutes: 10
        env:
          SSH_TARGET: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=10 $SSH_TARGET "cd /opt/mamajan && git pull origin main && cd Raluma && docker compose build && docker compose up -d"

      - name: Health check
        env:
          SSH_TARGET: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            if ssh $SSH_TARGET "curl -sf http://localhost/health" > /dev/null 2>&1; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "Health check failed after 5 attempts!"
          exit 1

      - name: Cleanup old images
        if: success()
        env:
          SSH_TARGET: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
        run: ssh $SSH_TARGET "docker image prune -f" || true
