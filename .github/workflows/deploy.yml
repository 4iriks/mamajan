name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o ServerAliveInterval=15 -o ServerAliveCountMax=20 \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              'cd /opt/mamajan && git fetch origin main 2>&1 && git reset --hard origin/main 2>&1 && cd Raluma && docker compose build 2>&1 && docker compose up -d 2>&1'

      - name: Health check
        run: |
          sleep 8
          for i in 1 2 3 4 5 6; do
            if ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'curl -sf http://localhost/health' 2>/dev/null; then
              echo "Deploy successful!"
              exit 0
            fi
            echo "Attempt $i/6, waiting 5s..."
            sleep 5
          done
          echo "Health check failed!"
          exit 1
