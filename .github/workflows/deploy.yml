name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    # Only deploy if CI passed AND it was a push (not PR)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/mamajan/Raluma

            echo "=== Saving current image IDs for rollback ==="
            OLD_BACKEND=$(docker compose images backend -q 2>/dev/null || echo "")
            OLD_FRONTEND=$(docker compose images frontend -q 2>/dev/null || echo "")

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Building images ==="
            docker compose build

            echo "=== Starting services ==="
            docker compose up -d

            echo "=== Waiting for backend to start ==="
            sleep 5

            echo "=== Health check ==="
            HEALTH_OK=false
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                HEALTH_OK=true
                break
              fi
              echo "Health check attempt $i failed, retrying in 3s..."
              sleep 3
            done

            if [ "$HEALTH_OK" = "true" ]; then
              echo "=== Deploy successful! ==="
              docker image prune -f
            else
              echo "=== HEALTH CHECK FAILED — ROLLING BACK ==="
              if [ -n "$OLD_BACKEND" ]; then
                git checkout HEAD~1
                docker compose build
                docker compose up -d
                echo "=== Rolled back to previous version ==="
              fi
              exit 1
            fi
