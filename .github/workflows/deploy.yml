name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    env:
      SSH_OPTS: -o ServerAliveInterval=15 -o ServerAliveCountMax=20 -o ConnectTimeout=10

    steps:
      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        run: |
          echo "=== known_hosts ==="
          cat ~/.ssh/known_hosts || echo "EMPTY"
          echo "=== key file ==="
          ls -la ~/.ssh/id_ed25519
          echo "=== ssh attempt ==="
          ssh -vvv $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "echo OK" 2>&1 | tail -30

      - name: Git pull
        run: ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /opt/mamajan && git pull origin main"

      - name: Docker build backend
        timeout-minutes: 8
        run: ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /opt/mamajan/Raluma && docker compose build backend"

      - name: Docker build frontend
        timeout-minutes: 8
        run: ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /opt/mamajan/Raluma && docker compose build frontend"

      - name: Restart services
        run: ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /opt/mamajan/Raluma && docker compose up -d"

      - name: Health check
        run: |
          sleep 5
          for i in 1 2 3 4 5 6; do
            if ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "curl -sf http://localhost/health" > /dev/null 2>&1; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed!"
          exit 1

      - name: Cleanup
        if: success()
        run: ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "docker image prune -f" || true
