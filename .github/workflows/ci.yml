name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Raluma

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Raluma/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Build (catch import/bundle errors)
        run: VITE_API_URL='' npm run build

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Raluma/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: Raluma/backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: pytest
        run: pytest -v

  docker-build:
    name: Docker build test
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    # Only on push to main (not on PRs — saves minutes)
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t raluma-frontend-test ./Raluma

      - name: Build backend image
        run: docker build -t raluma-backend-test ./Raluma/backend
